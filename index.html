<!DOCTYPE html>
<html>
<head>
    <title>Hiker Tracker</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f4f7;
            padding: 30px;
        }

        h1 {
            color: #1f2937;
        }

        .person {
            background: white;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 10px;
        }

        .safe {
            color: green;
        }

        .warning {
            color: red;
        }
    </style>
</head>

<body>
    <h1>Hiker Tracker</h1>

    <button id="refresh-button">Refresh people</button>

    <p id="message">Press Refresh to load hikers.</p>

    <div id="people-list"></div>

    <script>
       const refreshButton = document.getElementById("refresh-button");
const message = document.getElementById("message");
const peopleList = document.getElementById("people-list");


async function loadPeople() {
    message.textContent = "Loading hikers...";

    try {
        // Ask your FastAPI endpoint for everyone
        const response = await fetch("http://127.0.0.1:8000/people");

        // If FastAPI returned an error, stop here
        if (!response.ok) {
            throw new Error("Could not load people");
        }

        // Convert the JSON response into a JavaScript list
        const people = await response.json();

        // Remove old cards before creating fresh ones
        peopleList.innerHTML = "";

        // Create one HTML card for every person from the API
        for (const person of people) {
            const card = document.createElement("div");
            card.className = "person";

            const statusClass =
                person.status === "WARNING" ? "warning" : "safe";

            card.innerHTML = `
                <h2>${person.name} — ${person.role}</h2>
                <p>Location: (${person.latitude.toFixed(6)}, ${person.longitude.toFixed(6)})</p>
                <p class="${statusClass}">Status: ${person.status}</p>
            `;

            peopleList.appendChild(card);
        }

        message.textContent = `Loaded ${people.length} people.`;

    } catch (error) {
       message.textContent = `Could not load or display people: ${error.message}`;
        console.error(error);
    }
}


// Run loadPeople when the button is clicked
refreshButton.addEventListener("click", loadPeople);
loadPeople();
setInterval(loadPeople, 2000);
    </script>
</body>
</html>
