<!DOCTYPE html>
<html>
<head>
    <title>Hiker Tracker</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f2f4f7;
            padding: 30px;
        }

        h1 {
            color: #1f2937;
        }

        .person {
            background: white;
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 10px;
        }

        .safe {
            color: green;
        }

        .warning {
            color: red;
        }
    </style>
</head>

<body>
    <h1>Hiker Tracker</h1>

    <div class="person">
        <h2>Razie — Leader</h2>
        <p>Location: (3.140000, 101.690000)</p>
        <p class="safe">Status: SAFE</p>
    </div>

   <div class="person">
    <h2>Benjamin — Hiker</h2>
    <p>Location: (3.139900, 101.689900)</p>
    <p id="benjamin-status" class="safe">Status: SAFE</p>

    <button onclick="toggleBenjaminStatus()">
        Toggle Benjamin's Status
    </button>
</div>
</body>
<script>
    function toggleBenjaminStatus() {
        const status = document.getElementById("benjamin-status");

        if (status.textContent === "Status: SAFE") {
            status.textContent = "Status: WARNING";
            status.className = "warning";
        } else {
            status.textContent = "Status: SAFE";
            status.className = "safe";
        }
    }
</script>
</html>
